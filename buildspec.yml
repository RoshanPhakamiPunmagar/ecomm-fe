version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo Moving into frontend folder...
      - cd customer-frontend
      - echo Installing dependencies...
      - npm install
  build:
    commands:
      - echo Building React frontend...
      - npm run build
artifacts:
  files:
    - '**/*'
  base-directory: customer-frontend/build